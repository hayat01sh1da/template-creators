# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: Ruby

on:
  push:
    branches:
      - master
    paths:
      - .github/actions/setup-ruby/action.yml
      - .github/workflows/ruby.yml
      - .ruby-version
      - ruby/**/*.rb
      - ruby/**/*.rbs
      - ruby/rubocop.yml
      - ruby/rubocop_todo.yml
      - ruby/Steepfile
  pull_request:
    paths:
      - .github/actions/setup-ruby/action.yml
      - .github/workflows/ruby.yml
      - .ruby-version
      - ruby/**/*.rb
      - ruby/**/*.rbs
      - ruby/rubocop.yml
      - ruby/rubocop_todo.yml
      - ruby/Steepfile

permissions:
  contents: read
  pull-requests: read

jobs:
  change-detection:
    runs-on: ubuntu-latest
    outputs:
      ruby-changes: ${{ steps.ruby.outputs.changes }}
      rubocop-changes: ${{ steps.rubocop.outputs.changes }}
      steep-changes: ${{ steps.steep.outputs.changes }}
    steps:
      - name: Change Detection
        uses: dorny/paths-filter@v4
        id: change-detection
        with:
          filters: |
            ruby: |
              .github/actions/setup-ruby/action.yml
              .github/workflows/ruby.yml
              .ruby-version
              ruby/**/*.rb
            rubocop: |
              .github/actions/setup-ruby/action.yml
              .github/workflows/ruby.yml
              .ruby-version
              ruby/**/*.rb
              ruby/rubocop.yml
              ruby/rubocop_todo.yml
            steep: |
              .github/actions/setup-ruby/action.yml
              .github/workflows/ruby.yml
              .ruby-version
              ruby/**/*.rb
              ruby/**/*.rbs
              ruby/Steepfile
  minitest:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: change-detection
    if: needs.change-detection.outputs.ruby-changes == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ruby
      - name: Minitest
        working-directory: ./ruby
        run: ruby test/application_test.rb
  rubocop:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: change-detection
    if: needs.change-detection.outputs.rubocop-changes == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ruby
      - name: RuboCop
        working-directory: ./ruby
        run: |
          gem install rubocop rubocop-minitest rubocop-performance
          rubocop
  steep:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: change-detection
    if: needs.change-detection.outputs.steep-changes == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ruby
      - name: Steep
        working-directory: ./ruby
        run: |
          gem install rbs-inline steep
          rbs-inline --output sig/generated/ .
          steep check
