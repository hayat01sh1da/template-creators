inherit_from: .rubocop_todo.yml

# Reference: https://github.com/rubocop/ruby-style-guide

plugins:
  - rubocop-minitest
  - rubocop-performance

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

Metrics/ClassLength:
  CountAsOne: ['array', 'hash', 'method_call']
  CountComments: false
  CountEmptyLines: false
  Max: 250
